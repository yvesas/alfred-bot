# Orquestra o bot e (opcionalmente) o serviço de OCR self-hosted (PaddleOCR).
#
#   Padrão (OCR via Gemini/Vision):   docker compose up -d
#       -> sobe apenas o bot. Não precisa do serviço de OCR.
#
#   Self-host (PaddleOCR):            docker compose --profile paddle up -d
#       -> sobe bot + ocr. Defina no bot/.env:
#            OCR_PROVIDER=paddle
#            PADDLE_OCR_URL=http://ocr:8000
#
#   Observabilidade (Prometheus+Grafana): docker compose --profile monitoring up -d
#       -> Prometheus scrapeia http://bot:3000/metrics ; Grafana em http://localhost:3001

services:
  bot:
    build: ./bot
    env_file: ./bot/.env
    environment:
      # DEV: usa o MongoDB interno do compose (sobrescreve o DATABASE_URL do .env).
      # Em PRODUÇÃO, aponte o DATABASE_URL para o Atlas (via env/secret do host).
      DATABASE_URL: mongodb://mongo:27017/alfred
      # As credenciais do Google não vão na imagem (gitignored); são montadas via volume abaixo.
      # Este valor sobrescreve o do .env para apontar ao caminho montado dentro do container.
      GOOGLE_APPLICATION_CREDENTIALS: /secrets/google-credentials.json
      # DEV: habilita também o chat web; origens permitidas no WebSocket (front em :8081 e :5173).
      PLATFORMS: telegram,web
      WEB_ALLOWED_ORIGIN: http://localhost:8081,http://localhost:5173
    depends_on:
      mongo:
        condition: service_healthy
    networks: [app-net]
    restart: unless-stopped
    ports:
      - "3100:3100" # WebSocket do chat web (browser conecta em ws://localhost:3100)
    volumes:
      # Sessão do WhatsApp (Baileys) — persiste o login por QR entre reinícios.
      - wa-session:/app/.wa-session
      # Credenciais do Google (read-only) — montadas, não embutidas na imagem.
      - ./bot/src/config/google-credentials.json:/secrets/google-credentials.json:ro
    # /health (liveness), /ready (readiness) e /metrics (Prometheus) na porta HEALTH_PORT (3000).
    healthcheck:
      test:
        ["CMD", "node", "-e", "require('http').get('http://localhost:3000/ready',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 40s
      retries: 3

  # Frontend de chat (React/Vite) servido por nginx.
  web:
    build:
      context: ./web
      args:
        # URL do WebSocket embutida no build (o bot publica :3100 no host).
        VITE_WS_URL: ws://localhost:3100
    ports:
      - "8081:80" # chat em http://localhost:8081
    depends_on: [bot]
    networks: [app-net]
    restart: unless-stopped

  # MongoDB interno para desenvolvimento/testes (em prod use o Atlas).
  mongo:
    image: mongo:7
    networks: [app-net]
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      start_period: 20s
      retries: 5

  ocr:
    build: ./ocr-service
    profiles: [paddle] # opcional: só sobe com --profile paddle
    # paddlepaddle não tem wheel para linux/arm64. Em máquinas ARM (ex.: Mac Apple Silicon),
    # descomente a linha abaixo para buildar via emulação. Em EC2 x86_64 não é necessário.
    # platform: linux/amd64
    networks: [app-net]
    restart: unless-stopped
    volumes:
      - paddle-models:/root/.paddleocr # cache dos modelos (evita re-download)
    deploy:
      resources:
        limits:
          memory: 2g # PaddleOCR carrega os modelos na RAM

  # Stack de observabilidade — opcional (--profile monitoring).
  prometheus:
    image: prom/prometheus:latest
    profiles: [monitoring]
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks: [app-net]
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    profiles: [monitoring]
    ports:
      - "3001:3000" # UI do Grafana em http://localhost:3001
    volumes:
      - grafana-data:/var/lib/grafana
    networks: [app-net]
    restart: unless-stopped

networks:
  app-net:
    driver: bridge

volumes:
  paddle-models:
  grafana-data:
  wa-session:
  mongo-data:
